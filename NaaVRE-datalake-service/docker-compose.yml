services:

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: vrefs
      POSTGRES_USER: vrefs
      POSTGRES_PASSWORD: vrefs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  service:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: vreFS.settings
      DEBUG: "true"
      DISABLE_AUTH: "true"
      FAKE_JWT_SECRET: fake-secret
      SECRET_KEY: dev-secret-key
      DB_NAME: vrefs
      DB_USER: vrefs
      DB_PASSWORD: vrefs
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      S3_STAGING_ENDPOINT: http://minio:9000
      S3_STAGING_BUCKET: vrefs-staging
      S3_STAGING_ACCESS_KEY: minioadmin
      S3_STAGING_SECRET_KEY: minioadmin
      S3_STAGING_MAX_SIZE_BYTES: "10485760"
      S3_STAGING_TTL_DAYS: "60"
      # Public endpoint used by vrefs client running on researcher's machine.
      # Django uses http://minio:9000 internally; the client needs localhost.
      VREFS_S3_PUBLIC_ENDPOINT: http://localhost:9000
      # S3 backend credentials — referenced by name from backend.credentials.
      # Add your own env vars here for each S3 backend you connect.
      VREFS_MINIO_ACCESS_KEY: minioadmin
      VREFS_MINIO_SECRET_KEY: minioadmin
      # GitHub backend token — set your PAT here for private repos
      VREFS_GITHUB_TOKEN: ""
      # WebDAV backend credentials — set for SURF Research Drive or other WebDAV
      VREFS_WEBDAV_USERNAME: ""
      VREFS_WEBDAV_PASSWORD: ""
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A vreFS worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: vreFS.settings
      DEBUG: "true"
      DISABLE_AUTH: "true"
      FAKE_JWT_SECRET: fake-secret
      SECRET_KEY: dev-secret-key
      DB_NAME: vrefs
      DB_USER: vrefs
      DB_PASSWORD: vrefs
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      S3_STAGING_ENDPOINT: http://minio:9000
      VREFS_MINIO_ACCESS_KEY: minioadmin
      VREFS_MINIO_SECRET_KEY: minioadmin
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/vrefs-staging;
      echo 'Bucket ready';
      "

volumes:
  pgdata:
  miniodata: